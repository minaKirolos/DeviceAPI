services:
  db:
    image: mysql:8.0
    container_name: device-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devicedb
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: device-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db          # service name = hostname inside the compose network
      DB_PORT: 3306        # container-internal port, not the host one
      DB_NAME: devicedb
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data: